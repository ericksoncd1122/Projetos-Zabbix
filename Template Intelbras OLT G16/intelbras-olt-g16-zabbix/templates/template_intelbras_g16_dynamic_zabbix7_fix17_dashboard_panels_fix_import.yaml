      name: PON discovery
      type: EXTERNAL
      key: intelbras_g16_lld_v2.py[pon,{HOST.CONN},{$SNMP_COMMUNITY}]
      delay: 10m
      description: Descoberta dinâmica das portas PON g0/1..g0/16 a partir do IF-MIB.
      item_prototypes:
      - uuid: da916e323c5e4e7fa81a705981cb8968
