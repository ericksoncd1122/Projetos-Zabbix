          - '0'
      - uuid: 6523670900004e7c98ac7349a6240107
        name: 'PON {#PORTNAME}: RX pps'
        type: DEPENDENT
        key: intelbras.g16.pon.rx.pps[{#PORT}]
        delay: '0'
        history: 90d
        units: pps
        tags:
        - tag: component
          value: pon
        - tag: interface
          value: '{#PORTNAME}'
        master_item:
          key: intelbras.g16.pon.raw
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.13464.1.14.2.3.5.1.8.0.{#PORT}
          - '0'
      - uuid: b31830eb3d3947ccbaf41fb84c2207af
        name: 'PON {#PORTNAME}: ONU total'
        type: DEPENDENT
        key: intelbras.g16.pon.onu.total[{#PORT}]
        delay: '0'
        history: 90d
        tags:
        - tag: component
          value: pon
        - tag: interface
          value: '{#PORTNAME}'
        master_item:
          key: intelbras.g16.onu.status.raw
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - 'var port = ''{#PORT}'';

            var group = ''0'';

            var re = new RegExp(''\\.1\\.3\\.6\\.1\\.4\\.1\\.13464\\.1\\.14\\.2\\.4\\.1\\.1\\.1\\.6\\.''+group+''\\.''+port+''\\.\\d+\\s+=\\s+INTEGER:\\s+\\d+\\s*$'');

            var count=0;

            value.split(/\n+/).forEach(function(line){ if(re.test(line)) count++;});

            return count;'
      - uuid: c1e776bcfe0e4f368e0dc3a79d3abd8c
        name: 'PON {#PORTNAME}: ONU online'
        type: DEPENDENT
