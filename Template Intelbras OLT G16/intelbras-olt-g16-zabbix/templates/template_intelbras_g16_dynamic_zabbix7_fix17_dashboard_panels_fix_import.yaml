      type: DEPENDENT
      key: intelbras.g16.onu.total
      delay: '0'
      master_item:
        key: intelbras.g16.onu.status.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var lines = value.split(/\\n+/).filter(Boolean);\nvar count = 0;\nfor (var\
          \ i = 0; i < lines.length; i++) {\n  if (lines[i].indexOf('INTEGER:') !==\
          \ -1) count++;\n}\nreturn count;\n"
      tags:
