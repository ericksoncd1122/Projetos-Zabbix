            var group = ''0'';

            var re = new RegExp(''\\.1\\.3\\.6\\.1\\.4\\.1\\.13464\\.1\\.14\\.2\\.4\\.1\\.1\\.1\\.6\\.''+group+''\\.''+port+''\\.\\d+\\s+=\\s+INTEGER:\\s+1\\s*$'');

            var count=0;

            value.split(/\n+/).forEach(function(line){ if(re.test(line)) count++;});

            return count;'
      - uuid: d8b5d8b5d8b54a1aa1aa1234567890ab
        name: 'PON {#PORTNAME}: ONU offline'
        type: DEPENDENT
        key: intelbras.g16.pon.onu.offline[{#PORT}]
        delay: '0'
        history: 30d
        units: ''
        tags:
        - tag: component
          value: pon
        - tag: scope
          value: counter
        master_item:
          key: intelbras.g16.pon.raw
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.13464.1.14.2.3.5.1.6.0.{#PORT}
          - '0'
      trigger_prototypes:
      - uuid: 8f0fa6ca0c27471bb8e5f71a64894393
        expression: last(/Intelbras_G16_SNMP_ScriptV2/intelbras.g16.pon.onu.total[{#PORT}])>0
          and last(/Intelbras_G16_SNMP_ScriptV2/intelbras.g16.pon.oper[{#PORT}])<>1
        name: 'PON {#PORTNAME}: Link down (porta com clientes - possível rompimento/falha)'
        opdata: 'Status atual: {ITEM.LASTVALUE1}'
        priority: DISASTER
        description: A interface PON está fora de operação. Pode indicar rompimento,
          falha óptica ou indisponibilidade da porta.
        tags:
        - tag: scope
          value: availability
        - tag: component
          value: pon
      - uuid: e9c1e9c1e9c14b22b22b1234567890ab
