        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.13464.1.14.2.3.5.1.3.0.{#PORT}
          - '0'
      - uuid: f8f7498e0c274b81a32f8bad6c657bcb
