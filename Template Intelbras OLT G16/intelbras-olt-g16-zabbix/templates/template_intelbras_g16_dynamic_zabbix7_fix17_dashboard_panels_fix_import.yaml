zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 45de7777a66842d9932c58971a2a0a26
    name: Templates/Intelbras
  templates:
  - uuid: a11baa4635c64f989f4fbc12a9eed921
    template: Intelbras_G16_SNMP_ScriptV2
    name: Intelbras G16 by SNMP (Script LLD v2)
    description: 'Template dinâmico para OLT Intelbras G16 via SNMP, voltado para
      reaproveitamento em múltiplas OLTs do mesmo modelo.


      Cobertura desta versão:

      - Sistema: CPU, memória, temperaturas, uptime, sysName e ICMP.

      - Descoberta dinâmica (LLD) das 16 portas PON a partir do IF-MIB.

      - Descoberta dinâmica das portas Ethernet de uplink (e1/* e e2/*) a partir do
      IF-MIB.

      - Descoberta dinâmica dos SFPs presentes a partir da MIB privada Intelbras.

      - Descoberta dinâmica das ONUs a partir da tabela básica da MIB privada Intelbras.

      - Coleta de tráfego/utilização/pps das portas PON pela MIB privada.

      - Coleta de metadados e telemetria principal dos SFPs.

      - Coleta de informações básicas e versão das ONUs.

      - Itens brutos para óptico e Ethernet de ONU mantidos para futura expansão quando
      o firmware responder essas tabelas de forma consistente.


      Observações:

      - O ramo de descoberta .1.3.6.1.4.1.13464.1.14.2.3.1.1 retornou "No Such Object"
      no firmware analisado; por isso a descoberta de ONUs usa parsing da tabela básica.

      - Os ramos óptico/Ethernet de ONU ficaram vazios no walk validado; por segurança,
      esta versão não cria itens por-ONU desses ramos para evitar itens não suportados
      em massa.

      '
    vendor:
      name: OpenAI
      version: 7.0-script-v2
    groups:
    - name: Templates/Intelbras
    macros:
    - macro: '{$SNMP.TIMEOUT}'
      value: 20s
    - macro: '{$CPU.WARN}'
      value: '85'
    - macro: '{$CPU.CRIT}'
      value: '95'
    - macro: '{$MEM.WARN}'
      value: '90'
    - macro: '{$TEMP.SWITCH.WARN}'
      value: '75'
    - macro: '{$TEMP.GPON.WARN}'
      value: '75'
    - macro: '{$PON.UTIL.WARN}'
      value: '80'
    - macro: '{$SFP.TEMP.WARN}'
      value: '70'
    - macro: '{$SFP.RX.MIN}'
      value: '-28'
    - macro: '{$UPLINK.IFNAME.MATCHES}'
      value: ^e[12]/
    - macro: '{$PON.ONU.DOWN.MINUTES}'
      value: 5m
    - macro: '{$UPLINK.TRAFFIC.WARN}'
      value: '800000000'
    - macro: '{$SNMP_COMMUNITY}'
      value: WNET-TELECOM
    items:
