    - uuid: b3f2bcb4181348e88b892b427d4d9d68
      name: Descoberta de ONUs autorizadas e sinal óptico
      type: SNMP_AGENT
      snmp_oid: discovery[{#ONU_SLOT},.1.3.6.1.4.1.5875.800.3.10.1.1.2,{#ONU_PON},.1.3.6.1.4.1.5875.800.3.10.1.1.3,{#ONU_ID},.1.3.6.1.4.1.5875.800.3.10.1.1.4,{#ONU_NAME},.1.3.6.1.4.1.5875.800.3.10.1.1.7,{#ONU_SN},.1.3.6.1.4.1.5875.800.3.10.1.1.8,{#ONU_STATUS},.1.3.6.1.4.1.5875.800.3.10.1.1.11]
