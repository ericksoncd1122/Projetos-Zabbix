        - color: 6C59DC
          item:
            host: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
            key: net.if.out.discards["{#SNMPINDEX}"]
      description: Descoberta de interfaces via IF-MIB. O alerta de link down só dispara
        para portas com tráfego recente nas últimas 24h, usando {$IF.LINKDOWN.MIN.BPS}.
      trigger_prototypes:
      - uuid: 781a71c4c2154cf3aa7c427acb6c50f6
        expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/net.if.oper.status["{#SNMPINDEX}"])=2 and last(/Template - OLT Intelbras
          FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.admin.status["{#SNMPINDEX}"])=1
          and (max(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.in["{#SNMPINDEX}"],24h)>{$IF.LINKDOWN.MIN.BPS}
          or max(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.out["{#SNMPINDEX}"],24h)>{$IF.LINKDOWN.MIN.BPS})
        name: 'Interface {#IFNAME}: link down em porta SFP/Ethernet com tráfego recente'
        priority: DISASTER
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP
          Direto V5.24 Unificado/net.if.oper.status["{#SNMPINDEX}"])=1 or last(/WNET
          - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.admin.status["{#SNMPINDEX}"])<>1
        description: Dispara apenas para interfaces descobertas pelo IF-MIB e com
          tráfego nas últimas 24h. Interfaces PON são ignoradas pela macro {$IF.DISCOVERY.NOT_MATCHES};
          quedas de PON são tratadas pelos alertas baseados nas ONUs registradas.
      - uuid: edc853aa89b3446ca4997667b2b7342f
        expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/net.if.speed["{#SNMPINDEX}"])>0 and (last(/Template - OLT Intelbras
          FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.in["{#SNMPINDEX}"])/last(/WNET
          - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.speed["{#SNMPINDEX}"]))
          * 100 >{$IF.UTIL.MAX}
        name: 'Interface {#IFNAME}: alto uso de download/RX'
        priority: WARNING
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: (last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP
          Direto V5.24 Unificado/net.if.in["{#SNMPINDEX}"])/last(/Template - OLT Intelbras
          FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.speed["{#SNMPINDEX}"]))
          * 100 <({$IF.UTIL.MAX}-5)
      - uuid: b726661b60cd43ab9542978cbdeaac53
        expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/net.if.speed["{#SNMPINDEX}"])>0 and (last(/Template - OLT Intelbras
          FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.out["{#SNMPINDEX}"])/last(/WNET
          - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/net.if.speed["{#SNMPINDEX}"]))
          * 100 >{$IF.UTIL.MAX}
        name: 'Interface {#IFNAME}: alto uso de upload/TX'
