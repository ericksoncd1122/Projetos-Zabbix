    discovery_rules:
    - uuid: 2ebd7cec5ad94108b9b5d2b9bdc884b4
      name: Descoberta de cards/slots da OLT
      type: SNMP_AGENT
      snmp_oid: discovery[{#CARD},.1.3.6.1.4.1.5875.800.3.101.1.1.1,{#CARDTYPE},.1.3.6.1.4.1.5875.800.3.9.2.1.1.2,{#CARDMENUTIL},.1.3.6.1.4.1.5875.800.3.9.2.1.1.9,{#CARDCPUULTIL},.1.3.6.1.4.1.5875.800.3.9.2.1.1.8]
      key: fh.card.discovery
      delay: 5m
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      item_prototypes:
      - uuid: 90f3cc2bb1eb4499add40e245f9c044e
        name: 'Card {#CARD}: portas disponíveis'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.7.{#SNMPINDEX}
        key: card.portas.disponiveis["{#CARD}"]
        delay: 5m
        history: 7d
        trends: 30d
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Portas disponíveis
      - uuid: 229d9203ddc94f2b9a59ec16412876e3
        name: 'Card {#CARD}: uso de CPU'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.8.{#SNMPINDEX}
        key: card.cpu["{#CARD}"]
        delay: 1m
        history: 7d
        trends: 30d
        value_type: FLOAT
        units: '%'
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: CPU
      - uuid: 7c0dce29e6ca40a4aa4a38c48f35a9c9
        name: 'Card {#CARD}: versão de hardware'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.3.{#SNMPINDEX}
        key: card.hardware.version["{#CARD}"]
        delay: 1h
        history: 30d
        trends: '0'
        value_type: CHAR
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Versão hardware
      - uuid: efd9da09bdc646fab78e7397caf3c88c
        name: 'Card {#CARD}: uso de memória'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.9.{#SNMPINDEX}
        key: card.memoria["{#CARD}"]
        delay: 1m
        history: 7d
        trends: 30d
        value_type: FLOAT
        units: '%'
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Memória
      - uuid: 8525c6449aa945e9ace0f26f1d05b9d3
        name: 'Card {#CARD}: total de portas'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.6.{#SNMPINDEX}
        key: card.portas.total["{#CARD}"]
        delay: 5m
        history: 7d
        trends: 30d
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Total de portas
      - uuid: 0b39630132534fa58eb77dbd13010312
        name: 'Card {#CARD}: versão de software'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.4.{#SNMPINDEX}
        key: card.software.version["{#CARD}"]
        delay: 1h
        history: 30d
        trends: '0'
        value_type: CHAR
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Versão software
      - uuid: a07503e2dfff4fb9bbb4c8b38e3f25b9
        name: 'Card {#CARD}: status operacional'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.5.{#SNMPINDEX}
        key: card.status["{#CARD}"]
        delay: 5m
        history: 7d
        trends: 30d
        valuemap:
          name: 'FiberHome: status operacional'
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Status
      - uuid: d088571ff2414e9d985f04c92a7d338f
        name: 'Card {#CARD}: tipo do card'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.9.2.1.1.2.{#SNMPINDEX}
        key: card.tipo["{#CARD}"]
        delay: 5m
        history: 7d
        trends: 30d
        valuemap:
          name: 'FiberHome: tipo do card'
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Tipo
      - uuid: 377cee5fbf59439f891d042c4bb5541e
        name: 'Card {#CARD}: índice do slot'
        type: SNMP_AGENT
        snmp_oid: .1.3.6.1.4.1.5875.800.3.101.1.1.1.{#SNMPINDEX}
        key: card.slot.index["{#CARD}"]
        delay: 5m
        history: 7d
        trends: 30d
        tags:
        - tag: componente
          value: Card
        - tag: item
          value: Índice
      graph_prototypes:
      - uuid: 2b753d03015b43f798f97723db554a7d
        name: 'Card {#CARD}: CPU e memória'
        graph_items:
        - color: 199C0D
          item:
            host: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
            key: card.cpu["{#CARD}"]
        - color: F63100
          item:
            host: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
            key: card.memoria["{#CARD}"]
      - uuid: 80292f74bb0a4357aa1dd805d3e19764
        name: 'Card {#CARD}: portas'
        graph_items:
        - color: 2774A4
          item:
            host: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
            key: card.portas.total["{#CARD}"]
        - color: 6C59DC
          item:
            host: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
            key: card.portas.disponiveis["{#CARD}"]
      description: '

        V3.2: intervalo reduzido para acelerar a criação dos itens durante os testes.
        Em produção, pode aumentar para 1h/1d se desejar.'
      trigger_prototypes:
      - uuid: 17576c2ab1774ab5aba5591d8370ffb8
        expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/card.cpu["{#CARD}"],5m)>{$CPU.UTIL.WARN}
        name: 'Card {#CARD}: CPU alta acima de {$CPU.UTIL.WARN}% por 5 minutos'
        priority: WARNING
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto
          V5.24 Unificado/card.cpu["{#CARD}"],5m)<({$CPU.UTIL.WARN}-5)
      - uuid: 0f9ddcacbc06484c80263d006b02b8c2
        expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/card.memoria["{#CARD}"],5m)>{$MEM.UTIL.WARN}
        name: 'Card {#CARD}: memória alta acima de {$MEM.UTIL.WARN}% por 5 minutos'
        priority: WARNING
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto
          V5.24 Unificado/card.memoria["{#CARD}"],5m)<({$MEM.UTIL.WARN}-5)
        status: DISABLED
        description: Desativado por padrão conforme ajuste operacional.
      - uuid: efbc348378dd43aa8b8db4b251848d9d
        expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/card.status["{#CARD}"])=0
        name: 'Card {#CARD}: status operacional alterado/indisponível'
        priority: AVERAGE
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP
          Direto V5.24 Unificado/card.status["{#CARD}"])=1
