    macros:
    - macro: '{$SNMP_COMMUNITY}'
      value: public
      description: Community SNMP usada pelo script externo ponfh para consultar a
        OLT diretamente. Ajuste no host conforme o ambiente.
    - macro: '{$OLT.SNMP.IP}'
      value: 192.0.2.10
      description: 'IP ou DNS da OLT usado pelo script externo ponfh. Configure no
        host da OLT, exemplo: 192.0.2.10.'
    - macro: '{$SNMP_PORT}'
      value: '161'
      description: Porta SNMP usada pelo script externo ponfh.
    - macro: '{$SNMP_TIMEOUT}'
      value: '2'
      description: Timeout em segundos usado pelo script externo ponfh nas consultas
        SNMP.
    - macro: '{$SNMP_RETRIES}'
      value: '0'
      description: Quantidade de tentativas SNMP usada pelo script externo ponfh.
    - macro: '{$PONFH.CACHE_TTL}'
      value: '120'
      description: Tempo de cache local em segundos usado pelo script ponfh. Reduz
        a quantidade de snmpwalks quando vários itens da mesma OLT são coletados no
        mesmo ciclo.
    - macro: '{$TEMP.WARN}'
      value: '65'
      description: Temperatura de atenção da OLT em °C.
    - macro: '{$TEMP.CRIT}'
      value: '75'
      description: Temperatura crítica da OLT em °C.
    - macro: '{$CPU.UTIL.WARN}'
      value: '80'
      description: Limite de alerta para uso de CPU em %.
    - macro: '{$MEM.UTIL.WARN}'
      value: '85'
      description: Limite de alerta para uso de memória em %.
    - macro: '{$IF.UTIL.MAX}'
      value: '90'
      description: Limite de utilização de interface em %.
    - macro: '{$IF.LINKDOWN.MIN.BPS}'
      value: '1000'
      description: Tráfego mínimo nas últimas 24h para considerar porta SFP/Ethernet
        em uso antes de alertar link down. Interfaces PON são ignoradas pelo IF-MIB
        por padrão.
    - macro: '{$IF.DISCOVERY.MATCHES}'
      value: .*
      description: Regex de interfaces a descobrir.
    - macro: '{$IF.DISCOVERY.NOT_MATCHES}'
      value: (^lo$|^LoopBack|^NULL|^InLoopBack|^PON)
      description: Regex de interfaces a ignorar no IF-MIB. Por padrão ignora PON
        para evitar alerta de interface PON down; PON é monitorada pelos contadores
        de ONUs via ponfh.
    - macro: '{$ONU.QUEDA.PERCENT}'
      value: '50'
      description: Percentual de queda de ONUs online para alerta massivo.
    - macro: '{$ONU.QUEDA.MIN}'
      value: '10'
      description: Quantidade mínima de ONUs que devem cair para alerta massivo.
    - macro: '{$ONU.LOS.WARN}'
      value: '1'
      description: Quantidade mínima de ONUs em LOS para alerta parcial de fibra.
    - macro: '{$ONU.ENERGIA.REGIAO.MIN}'
      value: '5'
      description: Quantidade mínima de ONUs sem energia na PON para alerta de região
        sem energia.
    - macro: '{$ONU.RX.WARN}'
      value: '-27'
      description: Limite de atenção para sinal RX da ONU em dBm.
    - macro: '{$ONU.RX.CRIT}'
      value: '-30'
      description: Limite crítico para sinal RX da ONU em dBm.
    - macro: '{$ONU.RX.RECOVERY}'
      value: '-25'
      description: Valor de recuperação do sinal RX da ONU em dBm.
    - macro: '{$ONU.DISCOVERY.STATUS.MATCHES}'
      value: '1'
      description: Status de ONUs a descobrir individualmente. Padrão 1 = somente
        ONUs online, evitando OIDs inexistentes de sinal/MAC/serial em ONUs sem dados/offline.
        Para descobrir todas, use (0|1|2|3|4).
    - macro: '{$ONU.QUEDA30.PERCENT}'
      value: '30'
      description: Percentual de clientes offline/indisponíveis para alerta de queda
        parcial de 30%.
    - macro: '{$ONU.QUEDA50.PERCENT}'
      value: '50'
      description: Percentual de clientes offline/indisponíveis para alerta de queda
        parcial de 50%.
    - macro: '{$ONU.PON.MIN.CLIENTES}'
      value: '1'
      description: Quantidade mínima de ONUs autorizadas para validar alertas por
        PON.
