zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: bf9d8140c8204654b2297cccfd5e0c53
    name: Templates/Network devices
  templates:
  - uuid: 0c34e3ff1058468abb87ad3f464aa997
    template: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
    name: Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado
    description: 'Template reformulado para monitoramento de OLT Intelbras FiberHome
      AN6001-G16 no Zabbix 7.0.


      Baseado nos modelos anexados pelo usuário, com padronização dos nomes em português,
      alertas mais amigáveis, gráficos para itens numéricos/protótipos e dashboard
      principal.


      Inclui coletas SNMP de chassi, cards, CPU/memória, PON, interfaces via IF-MIB
      e sinal óptico de ONUs.


      As contagens de ONUs por status na PON usam script externo ''ponfh'', que consulta
      a própria OLT via SNMP diretamente, sem dependência de banco BeeSoft/MySQL.



      V2 SNMP direto: script ponfh com cache local opcional para reduzir carga na
      OLT. A coleta continua dinâmica usando a macro {$OLT.SNMP.IP} e macros SNMP,
      sem IP/community fixos.


      Versão V3.2:

      - Intervalos de descoberta reduzidos para facilitar os primeiros testes no Zabbix.

      - Template independente do template antigo de interfaces externas discovery_interfaces.py.

      - Manter somente este template no host, ou remover/desvincular templates antigos
      que usem discovery_interfaces.py.



      Versão V5.3:

      - Corrige referência interna de nome do template para evitar falha silenciosa
      na criação dos itens descobertos.

      - A descoberta de portas PON passa a usar o script externo ponfh --lld, garantindo
      PON no formato SLOT/PON, exemplo 1/4.

      - Remove dependência de {#SNMPINDEX} na descoberta de PON para os itens de contagem
      de ONUs.

      - Mantém o projeto dinâmico para qualquer OLT via macro {$OLT.SNMP.IP} e macros.



      Correção V5.4: uso de {$OLT.SNMP.IP}, remoção do diagnóstico ativo e ajuste
      de alerta de interfaces somente com tráfego recente.


      Versão V5.4:

      - Remove a coleta ativa de ventoinhas por OID fixo, pois em algumas AN6001-G16
      o índice de fan não existe e gera "No Such Instance".

      - Remove o item ativo de diagnóstico do Zabbix; o resumo continua disponível
      pelo script ponfh --summary no terminal.

      - Ajusta alerta de interface down para disparar somente em portas que tiveram
      tráfego nas últimas 24h, evitando alertas em PON/SFP/Ethernet não utilizadas.

      - Mantém sinal óptico das ONUs via OID de medição em lote; para valores diferentes
      de zero, a OLT precisa estar com mib stats enable.



      V5.5: desativados alertas de RX baixo/crítico por padrão; adicionados itens
      de percentual de clientes online/offline por PON; novos alertas de queda de
      30% e 50% de clientes por PON; alerta de PON down por LOS total com mensagem
      de possível rompimento; alerta de região sem energia/clientes off por falta
      de energia; alertas de link down de interface em prioridade alta; filtros de
      descoberta de cards/gerência flexibilizados para evitar dashboard vazio quando
      a OLT retorna cardtype diferente.


      V5.14: regra de descoberta de PON com chave nova (--lld-v514) para forçar a
      recriação dos itens e triggers de PON; mantidos alertas de rompimento por LOS
      total, região sem energia por status 4, queda parcial de 30% e 50%, e dashboard
      organizado.


      V5.24 Unificado: baseado na V5.14, mantendo a descoberta dinâmica principal.
      Inclui, no mesmo template, itens/triggers estáticos somente para os 2 alertas
      críticos por PON: possível rompimento e região sem energia.


      Ajustes V5.24: interfaces PON não são mais descobertas pelo IF-MIB por padrão
      para evitar falsos alertas de link down em PON sem uso; PON passa a ser alertada
      pelos contadores de ONUs via ponfh. Descoberta individual de ONUs passa a considerar
      somente ONUs online por padrão, evitando itens ópticos/MAC/serial sem OID para
      ONUs sem dados/offline.'
    groups:
    - name: Templates/Network devices
    items:
    - uuid: 51e9a83d3aff41afa6256ef7c6d77691
      name: 'Chassi: descrição do equipamento'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.1.0
      key: system.descricao
      delay: 1h
      history: 30d
      trends: '0'
      value_type: CHAR
      tags:
      - tag: componente
        value: Chassi
      - tag: item
        value: Descrição
    - uuid: 79fbbf633ae7489f869ab8ad2fb025d7
      name: 'Chassi: temperatura da OLT'
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.5875.800.3.9.4.5.0
      key: chassi.temperatura
      delay: 1m
      history: 7d
      trends: 30d
      value_type: FLOAT
      units: °C
      tags:
      - tag: componente
        value: Chassi
      - tag: item
        value: Temperatura
      triggers:
      - uuid: 3d0a819774914adcb4809aaa8109158a
        expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/chassi.temperatura,5m)>{$TEMP.WARN}
        name: 'OLT: temperatura alta acima de {$TEMP.WARN}°C'
        priority: WARNING
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto
          V5.24 Unificado/chassi.temperatura,5m)<({$TEMP.WARN}-3)
        description: Alerta preventivo para temperatura elevada da OLT.
      - uuid: 3a34a9a9640d46c084bd960be1427888
        expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/chassi.temperatura,5m)>{$TEMP.CRIT}
        name: 'OLT: temperatura crítica acima de {$TEMP.CRIT}°C'
        priority: HIGH
        manual_close: 'YES'
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: avg(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto
          V5.24 Unificado/chassi.temperatura,5m)<({$TEMP.CRIT}-3)
        description: Alerta crítico de temperatura elevada da OLT.
    - uuid: 89217551e9404c0f976c181437490ace
      name: 'Chassi: tempo ligado'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.3.0
      key: system.uptime
      delay: 1m
      history: 7d
      trends: 30d
      units: uptime
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: componente
        value: Chassi
      - tag: item
        value: Uptime
    - uuid: dcf5e70140cb46e8994b3a9155fa2672
      name: 'PON 1/1: cache JSON para alertas estáticos'
      type: EXTERNAL
      key: ponfh["1_1","json","{$OLT.SNMP.IP}","{$SNMP_COMMUNITY}","{$SNMP_PORT}","{$SNMP_TIMEOUT}","{$SNMP_RETRIES}","{$PONFH.CACHE_TTL}"]
      delay: 2m
      history: 1d
      trends: '0'
      value_type: TEXT
      tags:
      - &id001
        tag: componente
        value: PON
      - &id002
        tag: pon
        value: '1_1'
      - tag: item
        value: cache_json
      - tag: modo
        value: alerta_estatico
    - uuid: 089280599e894571911fc9abedb8aef7
      name: 'PON 1/1: total de ONUs autorizadas para alerta'
      type: DEPENDENT
      key: pon.alert.total.1_1
      delay: '0'
      history: 90d
      trends: 365d
      value_type: UNSIGNED
      master_item:
        key: ponfh["1_1","json","{$OLT.SNMP.IP}","{$SNMP_COMMUNITY}","{$SNMP_PORT}","{$SNMP_TIMEOUT}","{$SNMP_RETRIES}","{$PONFH.CACHE_TTL}"]
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.total
      tags:
      - *id001
      - *id002
      - tag: item
        value: total
      - tag: modo
        value: alerta_estatico
      triggers:
      - uuid: 53757cd1e8924fe583b27b4a7948917f
        name: PON 1/1 down, possível rompimento
        expression: last(/Template - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24
          Unificado/pon.alert.total.1_1)>={$ONU.PON.MIN.CLIENTES} and last(/WNET -
          OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/pon.alert.los.1_1)=last(/WNET
          - OLT Intelbras FiberHome AN6001-G16 SNMP Direto V5.24 Unificado/pon.alert.total.1_1)
        priority: DISASTER
        manual_close: 'YES'
        description: Dispara quando todas as ONUs autorizadas da PON estão em LOS.
          Indica possível rompimento, problema físico na fibra, splitter, CTO ou porta
          PON.
        tags:
        - tag: class
          value: network
        - tag: evento
          value: rompimento
        - tag: pon
          value: '1_1'
