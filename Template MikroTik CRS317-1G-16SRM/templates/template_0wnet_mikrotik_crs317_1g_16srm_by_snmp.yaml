        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: 42d15042704e42a5866ff9043a2f076a
        name: 'Interface {#IFNAME}({#IFALIAS}): Velocidade'
        type: DEPENDENT
        key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
        delay: '0'
        trends: '0'
        units: bps
        description: 'MIB: IF-MIB

          Estimativa da largura de banda atual da interface em unidades de 1.000.000 bits por segundo. Se este objeto reportar
          o valor `n`, entao a velocidade da interface esta aproximadamente no intervalo de `n-500.000` a `n+499.999`.

          Para interfaces que nao variam em largura de banda, ou quando nenhuma estimativa precisa puder ser feita, este objeto
          deve conter a largura de banda nominal.

          Para uma subcamada que nao tenha conceito de largura de banda, este objeto deve ser zero.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}
          - '0'
        - type: MULTIPLIER
          parameters:
          - '1000000'
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: net.if.walk
        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: d0382fdc7f624daea5b960cb9eae5144
        name: 'Interface {#IFNAME}({#IFALIAS}): Estado operacional'
        type: DEPENDENT
        key: net.if.status[ifOperStatus.{#SNMPINDEX}]
        delay: '0'
        trends: '0'
        description: "MIB: IF-MIB\nEstado operacional atual da interface.\n- O estado testing(3) indica que nenhum pacote\
          \ operacional pode passar\n- Se ifAdminStatus estiver down(2), entao ifOperStatus deve estar down(2)\n- Se ifAdminStatus\
          \ mudar para up(1), entao ifOperStatus deve mudar para up(1) se a interface estiver pronta para transmitir e receber\
          \ trafego de rede\n- Deve mudar para dormant(5) se a interface estiver aguardando acoes externas (como uma linha\
          \ serial aguardando uma conexao de entrada)\n- Deve permanecer no estado down(2) se, e somente se, houver uma falha\
          \ que impe\xE7a a ida para o estado up(1)\n- Deve permanecer no estado notPresent(6) se faltarem componentes da\
          \ interface (normalmente hardware).\n"
        valuemap:
          name: IF-MIB::Estado operacional
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}
          - '0'
        master_item:
          key: net.if.walk
        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
        trigger_prototypes:
        - uuid: 8862646c0c4b4b6b8978f0a475af2e6a
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2
            and (last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/0Wnet
            - MikroTik CRS317-1G-16SRM por SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
          recovery_mode: RECOVERY_EXPRESSION
          recovery_expression: last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2
            or {$IFCONTROL:"{#IFNAME}"}=0
          name: 'MikroTik: Interface {#IFNAME}({#IFALIAS}): Link inoperante'
          opdata: 'Estado atual: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: 'Esta expressao de alerta funciona assim:

            1. It can be triggered if the operations status is down.

            2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine the context macro to "0", marking this interface as not
            important. No new trigger will be fired if this interface is down.

            3. `last(/TEMPLATE_NAME/METRIC,#1)<>last(/TEMPLATE_NAME/METRIC,#2)` - the trigger fires only if the operational
            status was up to (1) sometime before (so, does not fire for "eternal off" interfaces.)


            AVISO: se fechado manualmente - it will not fire again on the next poll, because of .diff.

            '
          manual_close: 'YES'
          tags:
          - tag: escopo
            value: disponibilidade
      - uuid: 97269c7fce9d438598fc56509975bfd0
        name: 'Interface {#IFNAME}({#IFALIAS}): Tipo de interface'
        type: DEPENDENT
        key: net.if.type[ifType.{#SNMPINDEX}]
        delay: '0'
        trends: '0'
        description: 'MIB: IF-MIB

          Tipo da interface.

          Additional values for ifType are assigned by the Internet Assigned Numbers Authority (IANA),

          through updating the syntax of the IANAifType textual convention.

          '
        valuemap:
          name: IF-MIB::Tipo de interface
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}
          - '0'
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1d
        master_item:
          key: net.if.walk
        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      trigger_prototypes:
      - uuid: e1dc45c7e56349aa807d3322ff38f5fe
        expression: 'change(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0 and last(/0Wnet
          - MikroTik CRS317-1G-16SRM por SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0

          and (

          last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.type[ifType.{#SNMPINDEX}])=6 or

          last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.type[ifType.{#SNMPINDEX}])=7 or

          last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.type[ifType.{#SNMPINDEX}])=11 or

          last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.type[ifType.{#SNMPINDEX}])=62 or

          last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.type[ifType.{#SNMPINDEX}])=69 or

          last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/net.if.type[ifType.{#SNMPINDEX}])=117

