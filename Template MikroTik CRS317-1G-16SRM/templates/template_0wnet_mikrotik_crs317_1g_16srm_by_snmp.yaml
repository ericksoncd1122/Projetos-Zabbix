zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 6968c044b69349638baa02586a062777
    name: Templates/Dispositivos de rede
  templates:
  - uuid: 6d1823875b4647faaafd669ff43fbead
    template: 0Wnet - MikroTik CRS317-1G-16SRM por SNMP
    name: 0Wnet - MikroTik CRS317-1G-16S+RM por SNMP
    description: 'Template para monitorar o switch MikroTik CRS317-1G-16S+RM.


      Switch inteligente, 1 x Gigabit LAN, 16 x SFP+ portas, Dual Core 800MHz CPU, 1GB RAM,

      1U rackmount gabinete com resfriamento passivo, fontes de alimentacao duplas


      MIBs usadas:

      HOST-RESOURCES-MIB

      SNMPv2-MIB

      MIKROTIK-MIB

      IF-MIB


      Gerado pela ferramenta oficial de templates do Zabbix "Templator"

      '
    groups:
    - name: Templates/Dispositivos de rede
    items:
    - uuid: d1399c4b7d0b4801845fd00ee18c3c0f
      name: Ping ICMP
      type: SIMPLE
      key: icmpping
      valuemap:
        name: Estado do servico
      tags:
      - tag: componente
        value: saude
      - tag: componente
        value: rede
      triggers:
      - uuid: e840051359c84c2e84cc15f84d174075
        expression: max(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmpping,#3)=0
        name: 'MikroTik: Indisponivel por ping ICMP'
        priority: HIGH
        description: As ultimas tres tentativas retornaram timeout. Verifique a conectividade do dispositivo.
        tags:
        - tag: escopo
          value: disponibilidade
    - uuid: b952ec5bc8b84b68ac9b8e49c46968c2
      name: Perda ICMP
      type: SIMPLE
      key: icmppingloss
      value_type: FLOAT
      units: '%'
      tags:
      - tag: componente
        value: saude
      - tag: componente
        value: rede
      triggers:
      - uuid: 5d1a38d473f24e16ba9b5239ebcf27d0
        expression: min(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/0Wnet - MikroTik
          CRS317-1G-16SRM por SNMP/icmppingloss,5m)<100
        name: 'MikroTik: Alta perda de ping ICMP'
        opdata: 'Perda: {ITEM.LASTVALUE1}'
        priority: WARNING
        dependencies:
        - name: 'MikroTik: Indisponivel por ping ICMP'
          expression: max(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmpping,#3)=0
        tags:
        - tag: escopo
          value: disponibilidade
        - tag: escopo
          value: desempenho
    - uuid: 20d80a3ce3784ddca7ab715779bbf803
      name: Tempo de resposta ICMP
      type: SIMPLE
      key: icmppingsec
      value_type: FLOAT
      units: s
      tags:
      - tag: componente
        value: saude
      - tag: componente
        value: rede
      triggers:
      - uuid: 26369c2e261846c48852ad9d096eed26
        expression: avg(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}
        name: 'MikroTik: Alto tempo de resposta do ping ICMP'
        opdata: 'Valor: {ITEM.LASTVALUE1}'
        priority: WARNING
        description: O tempo medio de resposta ICMP esta muito alto.
        dependencies:
        - name: 'MikroTik: Alta perda de ping ICMP'
          expression: min(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/0Wnet - MikroTik
            CRS317-1G-16SRM por SNMP/icmppingloss,5m)<100
        - name: 'MikroTik: Indisponivel por ping ICMP'
          expression: max(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmpping,#3)=0
        tags:
        - tag: escopo
          value: disponibilidade
        - tag: escopo
          value: desempenho
    - uuid: c5bd3f7e1124448893c2e2a7d119d6e2
      name: 'MikroTik: Coleta SNMP de interfaces de rede'
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.2.1.2.2.1.8,1.3.6.1.2.1.2.2.1.7,1.3.6.1.2.1.31.1.1.1.18,1.3.6.1.2.1.31.1.1.1.1,1.3.6.1.2.1.2.2.1.2,1.3.6.1.2.1.2.2.1.3,1.3.6.1.2.1.31.1.1.1.6,1.3.6.1.2.1.31.1.1.1.10,1.3.6.1.2.1.2.2.1.14,1.3.6.1.2.1.2.2.1.20,1.3.6.1.2.1.2.2.1.19,1.3.6.1.2.1.2.2.1.13,1.3.6.1.2.1.31.1.1.1.15]
      key: net.if.walk
      history: '0'
      value_type: TEXT
      trends: '0'
      description: Descoberta de interfaces pela IF-MIB.
      tags:
      - tag: componente
        value: bruto
    - uuid: 03651b4f8b6e41f5b84d19080d7613cf
      name: Coleta SNMP de interfaces sem fio
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.4.1.14988.1.1.14.1.1.2,1.3.6.1.2.1.31.1.1.1.18,1.3.6.1.2.1.2.2.1.3,1.3.6.1.2.1.2.2.1.7,1.3.6.1.4.1.14988.1.1.16.1.1.2,1.3.6.1.4.1.14988.1.1.16.1.1.4,1.3.6.1.4.1.14988.1.1.16.1.1.3,1.3.6.1.4.1.14988.1.1.16.1.1.7,1.3.6.1.4.1.14988.1.1.1.3.1.4,1.3.6.1.4.1.14988.1.1.1.3.1.8,1.3.6.1.4.1.14988.1.1.1.3.1.9,1.3.6.1.4.1.14988.1.1.1.3.1.6,1.3.6.1.4.1.14988.1.1.1.3.1.11,1.3.6.1.4.1.14988.1.1.1.7.1.5,1.3.6.1.4.1.14988.1.1.1.7.1.4,1.3.6.1.4.1.14988.1.1.1.7.1.2,1.3.6.1.4.1.14988.1.1.1.7.1.3]
      key: net.if.wireless.walk
      history: '0'
      value_type: TEXT
      trends: '0'
      tags:
      - tag: componente
        value: bruto
    - uuid: afd6c9a41ab04ca2a866b0b424b74e91
      name: Traps SNMP (fallback)
      type: SNMP_TRAP
      key: snmptrap.fallback
      delay: '0'
      value_type: LOG
      trends: '0'
      description: O item coleta todas as traps SNMP que nao correspondem a outros itens snmptrap.
      logtimefmt: hh:mm:sszyyyy/MM/dd
      tags:
      - tag: componente
        value: rede
    - uuid: dca64aac3a7941d19b6088e5de0dea66
      name: Detalhes de contato do sistema
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.4.0
      key: system.contact[sysContact.0]
      delay: 15m
      value_type: CHAR
      trends: '0'
      description: 'MIB: SNMPv2-MIB

        Identificacao textual da pessoa de contato deste no gerenciado, junto com informacoes de contato. Se nenhuma informacao
        de contato for conhecida, o valor sera uma string vazia.

        '
      inventory_link: CONTACT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 12h
      tags:
      - tag: componente
        value: sistema
    - uuid: 5d3ece1ecfef434da28c68453d8d3300
      name: Coleta SNMP de CPUs do sistema
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.2.1.25.3.3.1.1,1.3.6.1.2.1.25.3.3.1.2]
      key: system.cpu.walk
      history: '0'
      value_type: TEXT
      trends: '0'
      description: 'MIB: HOST-RESOURCES-MIB

        Descoberta de CPUs do sistema.

        '
      tags:
      - tag: componente
        value: bruto
    - uuid: e87e2b7418ca4fa183fe089ee8c0ce77
      name: Descricao do sistema
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.1.0
      key: system.descr[sysDescr.0]
      delay: 15m
      value_type: CHAR
      trends: '0'
      description: 'MIB: SNMPv2-MIB

        Descricao textual da entidade. Este valor deve

        incluir o nome completo e a identificacao de versao do tipo de hardware, sistema operacional e

        software de rede.

        '
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 12h
      tags:
      - tag: componente
        value: sistema
    - uuid: d4aed4a7ba9b452e871974c2e9e9096a
      name: Versao do firmware
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.14988.1.1.7.4.0
      key: system.hw.firmware
      delay: 1h
      value_type: CHAR
      trends: '0'
      description: 'MIB: MIKROTIK-MIB

        Versao atual do firmware.

        '
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: componente
        value: sistema
      triggers:
      - uuid: 6b13f27d76d94da8a0de5d5f92c659b5
        expression: last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.hw.firmware,#1)<>last(/0Wnet - MikroTik CRS317-1G-16SRM
          por SNMP/system.hw.firmware,#2) and length(last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.hw.firmware))>0
        name: 'MikroTik: Firmware foi alterado'
        opdata: 'Valor atual: {ITEM.LASTVALUE1}'
        priority: INFO
        description: A versao do firmware foi alterada. Reconheca para fechar o problema manualmente.
        manual_close: 'YES'
        tags:
        - tag: escopo
          value: aviso
    - uuid: 894dd77dda544052aed136184394b16b
      name: Nome do modelo de hardware
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.1.0
      key: system.hw.model
      delay: 1h
      value_type: CHAR
      trends: '0'
      inventory_link: MODEL
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: componente
        value: sistema
    - uuid: 60d56109334242e1bceaf90ca5c6b599
      name: Numero de serie do hardware
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.14988.1.1.7.3.0
      key: system.hw.serialnumber
      delay: 1h
      value_type: CHAR
      trends: '0'
      description: 'MIB: MIKROTIK-MIB

        Numero de serie da RouterBOARD.

        '
      inventory_link: SERIALNO_A
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: componente
        value: sistema
      triggers:
      - uuid: 0c82449d80504a51866bc04eebae44d9
        expression: last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.hw.serialnumber,#1)<>last(/0Wnet - MikroTik CRS317-1G-16SRM
          por SNMP/system.hw.serialnumber,#2) and length(last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.hw.serialnumber))>0
        name: 'MikroTik: Dispositivo foi substituido'
        event_name: 'MikroTik: Dispositivo foi substituido (novo numero de serie recebido)'
        priority: INFO
        description: O numero de serie do dispositivo foi alterado. Reconheca para fechar o problema manualmente.
        manual_close: 'YES'
        tags:
        - tag: escopo
          value: aviso
    - uuid: e8432dfc551049ff8b951a6be92117e0
      name: Tempo ativo (hardware)
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.1.1.0
      key: system.hw.uptime[hrSystemUptime.0]
      delay: 30s
      trends: '0'
      units: uptime
      description: 'MIB: HOST-RESOURCES-MIB

        Tempo desde a ultima inicializacao deste host. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907]
        because sysUpTime is the uptime of the network management portion of the system.

        '
      preprocessing:
      - type: CHECK_NOT_SUPPORTED
        parameters:
        - '-1'
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: componente
        value: sistema
    - uuid: 54c9baf0b0524aceb83488841276b0f4
      name: Localizacao do sistema
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.6.0
      key: system.location[sysLocation.0]
      delay: 15m
      value_type: CHAR
      trends: '0'
      description: 'MIB: SNMPv2-MIB

        Localizacao fisica do no (por exemplo, `sala de equipamentos`, `3o andar`). Se nao for informado, o valor sera uma
        string vazia.

        '
      inventory_link: LOCATION
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 12h
      tags:
      - tag: componente
        value: sistema
    - uuid: 04e429b0afca40389a1fba8c4fed1c48
      name: Nome do sistema
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.5.0
      key: system.name
      delay: 15m
      value_type: CHAR
      trends: '0'
      description: 'MIB: SNMPv2-MIB

        Nome atribuido administrativamente a este no gerenciado. Por convencao, e o FQDN do no. Se o nome for desconhecido,
        o valor sera uma string vazia.

        '
      inventory_link: NAME
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 12h
      tags:
      - tag: componente
        value: sistema
      triggers:
      - uuid: 424d7e1764a845a0a906b83288cb8cde
        expression: last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.name,#1)<>last(/0Wnet - MikroTik CRS317-1G-16SRM
          por SNMP/system.name,#2) and length(last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.name))>0
        name: 'MikroTik: Nome do sistema foi alterado'
        event_name: 'MikroTik: Nome do sistema foi alterado (novo nome: {ITEM.VALUE})'
        priority: INFO
        description: O nome do sistema foi alterado. Reconheca para fechar o problema manualmente.
        manual_close: 'YES'
        tags:
        - tag: escopo
          value: aviso
        - tag: escopo
          value: seguranca
    - uuid: 26917e500f8541059f70f672046bd00e
      name: Tempo ativo (rede)
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.3.0
      key: system.net.uptime[sysUpTime.0]
      delay: 30s
      trends: '0'
      units: uptime
      description: 'MIB: SNMPv2-MIB

        Tempo (em centesimos de segundo) desde que a parte de gerenciamento de rede do sistema foi reinicializada pela ultima
        vez.

        '
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: componente
        value: sistema
    - uuid: fc89e6e13e3b423f9ced18b6c81fa95f
      name: ID de objeto do sistema
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.2.0
      key: system.objectid[sysObjectID.0]
      delay: 15m
      value_type: CHAR
      trends: '0'
      description: 'MIB: SNMPv2-MIB

        Identificacao autoritativa do fornecedor para o subsistema de gerenciamento de rede contido na entidade. Este valor
        e alocado dentro da subarvore SMI enterprises (1.3.6.1.4.1) e fornece um meio simples e inequivoco de determinar que
        tipo de equipamento esta sendo gerenciado. Por exemplo, se o fornecedor `Flintstones, Inc.` recebesse a subarvore
        1.3.6.1.4.1.4242, poderia atribuir o identificador 1.3.6.1.4.1.4242.1.1 ao seu `Fred Router`.

        '
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 12h
      tags:
      - tag: componente
        value: sistema
    - uuid: 7ee4efe47ba24928aaa0c86d7ede057c
      name: Sistema operacional
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.14988.1.1.4.4.0
      key: system.sw.os[mtxrLicVersion.0]
      delay: 1h
      value_type: CHAR
      trends: '0'
      description: 'MIB: MIKROTIK-MIB

        Versao do software.

        '
      inventory_link: OS
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      tags:
      - tag: componente
        value: os
      triggers:
      - uuid: e273447a04454dd0847d323d75441cd8
        expression: last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.sw.os[mtxrLicVersion.0],#1)<>last(/0Wnet - MikroTik
          CRS317-1G-16SRM por SNMP/system.sw.os[mtxrLicVersion.0],#2) and length(last(/0Wnet - MikroTik CRS317-1G-16SRM por
          SNMP/system.sw.os[mtxrLicVersion.0]))>0
        name: 'MikroTik: Descricao do sistema operacional foi alterada'
        priority: INFO
        description: 'A descricao do sistema operacional foi alterada. Possiveis motivos: o sistema foi atualizado ou substituido.
          Reconheca para fechar o problema manualmente.'
        manual_close: 'YES'
        dependencies:
        - name: 'MikroTik: Nome do sistema foi alterado'
          expression: last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.name,#1)<>last(/0Wnet - MikroTik CRS317-1G-16SRM
            por SNMP/system.name,#2) and length(last(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/system.name))>0
        tags:
        - tag: escopo
          value: aviso
    - uuid: 42f12b72be254974bc801dc331517111
      name: Coleta SNMP de sistemas de arquivos montados
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.2.1.25.2.3.1.3,1.3.6.1.2.1.25.2.3.1.4,1.3.6.1.2.1.25.2.3.1.2,1.3.6.1.2.1.25.2.3.1.6,1.3.6.1.2.1.25.2.3.1.5]
      key: vfs.fs.walk
      history: '0'
      value_type: TEXT
      trends: '0'
      description: 'MIB: HOST-RESOURCES-MIB

        Discovering mounted filesystems.

        '
      tags:
      - tag: componente
        value: bruto
    - uuid: d48acc0f004d4c87a8c7bf7a749fb9ec
      name: Memoria total
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.2.3.1.5.65536
      key: vm.memory.total[hrStorageSize.Memory]
      units: B
      description: 'MIB: HOST-RESOURCES-MIB

        Tamanho do armazenamento representado por esta entrada, em unidades de hrStorageAllocationUnits. Este objeto e gravavel
        para permitir a configuracao remota do tamanho da area de armazenamento nos casos em que essa operacao faz sentido
        e e possivel no sistema subjacente. Por exemplo, a quantidade de memoria principal alocada para um buffer pool pode
        ser modificada, ou a quantidade de espaco em disco alocada para memoria virtual pode ser modificada.

        '
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '1024'
      tags:
      - tag: componente
        value: memoria
    - uuid: 169b926622854046bfbea571021f650b
      name: Memoria usada
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.2.3.1.6.65536
      key: vm.memory.used[hrStorageUsed.Memory]
      units: B
      description: 'MIB: HOST-RESOURCES-MIB

        Quantidade do armazenamento representado por esta entrada que esta alocada, em unidades de hrStorageAllocationUnits.

        '
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '1024'
      tags:
      - tag: componente
        value: memoria
    - uuid: baff6addf2cf4b54b47e51f1acfa76e6
      name: Utilizacao de memoria
      type: CALCULATED
      key: vm.memory.util[memoryUsedPercentage.Memory]
      value_type: FLOAT
      units: '%'
      params: last(//vm.memory.used[hrStorageUsed.Memory])/last(//vm.memory.total[hrStorageSize.Memory])*100
      description: Utilizacao de memoria em %.
      tags:
      - tag: componente
        value: memoria
      triggers:
      - uuid: d6f88d936c334a97af806f4cb6df7bd2
        expression: min(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/vm.memory.util[memoryUsedPercentage.Memory],5m)>{$MEMORY.UTIL.MAX}
        name: 'MikroTik: Alta utilizacao de memoria'
        event_name: 'MikroTik: Alta utilizacao de memoria (>{$MEMORY.UTIL.MAX}% por 5m)'
        priority: AVERAGE
        description: O sistema esta ficando sem memoria livre.
        tags:
        - tag: escopo
          value: capacidade
        - tag: escopo
          value: desempenho
    - uuid: 4082a1a526804bda897d52c785af11ab
      name: Disponibilidade do agente SNMP
      type: INTERNAL
      key: zabbix[host,snmp,available]
      description: 'Disponibilidade das verificacoes SNMP no host. O valor deste item corresponde aos icones de disponibilidade
        na lista de hosts.

        Valores possiveis:

        0 - indisponivel

        1 - disponivel

        2 - desconhecido

        '
      valuemap:
        name: zabbix.host.disponivel
      tags:
      - tag: componente
        value: saude
      - tag: componente
        value: rede
      triggers:
      - uuid: bd0b744319da43a3b65c28aa5611afa9
        expression: max(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0
        name: 'MikroTik: Sem coleta de dados SNMP'
        opdata: 'Estado atual: {ITEM.LASTVALUE1}'
        priority: WARNING
        description: SNMP nao esta disponivel para coleta. Verifique a conectividade do dispositivo e as configuracoes SNMP.
        dependencies:
        - name: 'MikroTik: Indisponivel por ping ICMP'
          expression: max(/0Wnet - MikroTik CRS317-1G-16SRM por SNMP/icmpping,#3)=0
        tags:
        - tag: escopo
          value: disponibilidade
    discovery_rules:
