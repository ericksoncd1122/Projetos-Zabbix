        - tag: interface
          value: '{#IFNAME}'
      - uuid: 0fb7331bc430420fb01e54f9a48a800a
        name: 'Interface {#IFNAME}({#IFALIAS}): Pacotes de saida com erros'
        type: DEPENDENT
        key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
        delay: '0'
        description: 'MIB: IF-MIB

          For packet-oriented interfaces, the number of outbound packets that contained errors preventing them from being
          deliverable to a higher-layer protocol.  For character-oriented or fixed-length interfaces, the number of outbound
          transmission units that contained errors preventing them from being deliverable to a higher-layer protocol. Discontinuities
          in the value of this counter can occur at re-initialization of the management system, and at other times as indicated
          by the value of ifCounterDiscontinuityTime.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}
          - '0'
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 3m
        master_item:
