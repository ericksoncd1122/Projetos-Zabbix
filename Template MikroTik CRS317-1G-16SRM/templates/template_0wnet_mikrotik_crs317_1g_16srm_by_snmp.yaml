        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: e75bcce94d1648a492e45f28a81f8965
        name: 'Interface {#IFNAME}({#IFALIAS}): Bits enviados'
        type: DEPENDENT
        key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
        delay: '0'
        units: bps
        description: 'MIB: IF-MIB

          Numero total de octetos transmitidos pela interface, including framing characters. This object is a 64-bit version
          of ifOutOctets.Discontinuities in the value of this counter can occur at re-initialization of the management system,
          and at other times as indicated by the value of ifCounterDiscontinuityTime.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}
          - '0'
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: MULTIPLIER
          parameters:
          - '8'
        master_item:
