zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: e412f85ee6834ce5874a43a2de0c2bf1
    name: Templates/Network devices
  templates:
  - uuid: 97d0416def2d4e0d86a838f6c8ded46b
    template: Intelbras OLT 8820i by SNMP
    name: Intelbras OLT 8820i by SNMP
    description: 'Template para monitoramento da Intelbras OLT 8820i via SNMP.


      Montado a partir dos OIDs validados na sua própria OLT 10.20.20.6:

      - sistema (CPU, memória, uptime);

      - descoberta de ONUs pela árvore privada Intelbras;

      - descoberta de SFPs/GPON pela árvore privada Intelbras;

      - descoberta de interfaces pela IF-MIB padrão (status e tráfego).


      Compatível com Zabbix 7.0.

      O template usa itens mestre walk[] + itens dependentes para reduzir consultas SNMP.

      Leituras ópticas que retornam "--" são descartadas no pré-processamento para evitar itens unsupported.


      A versão atual mantém os itens ópticos/OMCI/status da ONU sem alertas individuais e adiciona alerta agregado por porta PON quando todas as ONUs registradas daquela porta ficam inativas.

      '
    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$CPU.UTIL.CRIT}'
      value: '85'
      description: Alerta de CPU alta (%)
    - macro: '{$MEM.FREE.MIN.PCT}'
      value: '15'
      description: Alerta de memória livre baixa (%)
    - macro: '{$ONU.OLT.RX.LOW}'
      value: '-28'
      description: Limite baixo do RX da OLT visto pela ONU (dBm)
    - macro: '{$ONU.RX.LOW}'
      value: '-28'
      description: Limite baixo do RX da ONU (dBm)
    - macro: '{$SFP.TEMP.HIGH}'
      value: '70'
      description: Temperatura alta do SFP (°C)
    - macro: '{$SFP.IFNAME.MATCHES}'
      value: ^gpon[0-9]+$
      description: Interfaces ópticas da árvore privada a descobrir por padrão
    - macro: '{$SFP.IFNAME.NOT_MATCHES}'
      value: ^$
      description: Interfaces ópticas a ignorar na descoberta
    - macro: '{$IFNAME.MATCHES}'
      value: ^(gpon|xeth)[0-9]+$
      description: Interfaces IF-MIB a descobrir por padrão
    - macro: '{$IFNAME.NOT_MATCHES}'
      value: ^$
      description: Interfaces IF-MIB a ignorar na descoberta
    items:
    - uuid: 84118f9104c8440c87f5a1ab7e694ba7
      name: 'Intelbras 8820i: ICMP ping'
      type: SIMPLE
      key: icmpping
      history: 7d
      valuemap:
        name: Service state
      tags:
      - tag: component
        value: network
      triggers:
      - uuid: 6b62fcd3018c4996b9da903d11e1ecb0
        expression: max(/Intelbras OLT 8820i by SNMP/icmpping,#3)=0
        name: 'Intelbras 8820i: Host indisponível por ICMP'
        priority: HIGH
        description: As últimas três tentativas de ICMP falharam.
        tags:
        - tag: scope
          value: availability
    - uuid: f9f3c427ee6d459daba7d562a843ab58
      name: 'Intelbras 8820i: System description'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.1.0
      key: intelbras.sys.descr
      delay: 1h
      history: 7d
      trends: '0'
      value_type: CHAR
      tags:
      - tag: component
        value: system
    - uuid: 61df6f7816e8463db5634b67fc240da9
      name: 'Intelbras 8820i: System name'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.5.0
      key: intelbras.sys.name
      delay: 15m
      history: 7d
      trends: '0'
      value_type: CHAR
      tags:
      - tag: component
        value: system
    - uuid: ad89b413d47d401a8288b501965920b1
      name: 'Intelbras 8820i: System location'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.6.0
      key: intelbras.sys.location
      delay: 15m
      history: 7d
      trends: '0'
      value_type: CHAR
      tags:
      - tag: component
        value: system
    - uuid: 41bbe931d79443d0a140f96b3554d3f0
      name: 'Intelbras 8820i: Uptime'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.3.0
      key: intelbras.sys.uptime
      delay: 30s
      history: 7d
      trends: '0'
      units: uptime
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      tags:
      - tag: component
        value: system
    - uuid: 054ffce0fe9c4dae9e0b7e0d9cded1c1
      name: 'Intelbras 8820i: CPU usage'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2021.11.9.0
      key: intelbras.cpu.util
      delay: 3m
      history: 7d
      value_type: FLOAT
      units: '%'
      tags:
      - tag: component
        value: cpu
      triggers:
      - uuid: 4aaf7db58fb94a288accd77386930fa3
        expression: min(/Intelbras OLT 8820i by SNMP/intelbras.cpu.util,5m)>{$CPU.UTIL.CRIT}
        name: 'Intelbras 8820i: CPU alta'
        event_name: 'Intelbras 8820i: CPU acima de {$CPU.UTIL.CRIT}% por 5m'
        opdata: 'Valor atual: {ITEM.LASTVALUE1}'
        priority: WARNING
        tags:
        - tag: scope
          value: performance
    - uuid: 3b6e819b86b141e69d6c9839ea886dd2
      name: 'Intelbras 8820i: Memory total'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2021.4.5.0
      key: intelbras.mem.total
      delay: 5m
      history: 7d
      units: B
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '1024'
      tags:
      - tag: component
        value: memory
    - uuid: bbbaa0c6957c4a649f419a0aaecaa63a
      name: 'Intelbras 8820i: Memory free'
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.2021.4.6.0
      key: intelbras.mem.free
      delay: 1m
      history: 7d
      units: B
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '1024'
      tags:
      - tag: component
        value: memory
    - uuid: 2a8588efbbec40d6a97f3493082b4cf1
      name: 'Intelbras 8820i: Memory free (%)'
      type: CALCULATED
      key: intelbras.mem.free.pct
      history: 7d
      value_type: FLOAT
      units: '%'
      params: last(//intelbras.mem.free)/last(//intelbras.mem.total)*100
      tags:
      - tag: component
        value: memory
      triggers:
      - uuid: e86983eb1fa04f94a2fe9a0bdfe39433
        expression: max(/Intelbras OLT 8820i by SNMP/intelbras.mem.free.pct,5m)<{$MEM.FREE.MIN.PCT}
        name: 'Intelbras 8820i: Memória livre baixa'
        event_name: 'Intelbras 8820i: Memória livre abaixo de {$MEM.FREE.MIN.PCT}% por 5m'
        opdata: 'Memória livre: {ITEM.LASTVALUE1}%'
        priority: WARNING
        tags:
        - tag: scope
          value: capacity
    - uuid: a703c465c3764e11baa8f0f99e4d31ec
      name: 'Intelbras 8820i: SNMP walk ONUs'
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.4.1.26138.1.2.1.1.1.2,1.3.6.1.4.1.26138.1.2.1.1.1.3,1.3.6.1.4.1.26138.1.2.1.1.1.4,1.3.6.1.4.1.26138.1.2.1.1.1.5,1.3.6.1.4.1.26138.1.2.1.1.1.6,1.3.6.1.4.1.26138.1.2.1.1.1.7,1.3.6.1.4.1.26138.1.2.1.1.1.8,1.3.6.1.4.1.26138.1.2.1.1.1.9]
      key: intelbras.onu.walk
      delay: 1m
      history: '0'
      trends: '0'
      value_type: TEXT
      description: Tabela de ONUs da Intelbras 8820i.
      tags:
      - tag: component
        value: raw
      timeout: 10s
    - uuid: e9528b0dfefb428488b54994fd5b9a88
      name: 'Intelbras 8820i: SNMP walk SFPs'
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.4.1.26138.1.1.1.1.1.2,1.3.6.1.4.1.26138.1.1.1.1.1.3,1.3.6.1.4.1.26138.1.1.1.1.1.4,1.3.6.1.4.1.26138.1.1.1.1.1.5,1.3.6.1.4.1.26138.1.1.1.1.1.6,1.3.6.1.4.1.26138.1.1.1.1.1.7,1.3.6.1.4.1.26138.1.1.1.1.1.8,1.3.6.1.4.1.26138.1.1.1.1.1.9,1.3.6.1.4.1.26138.1.1.1.1.1.10]
      key: intelbras.sfp.walk
      delay: 5m
      history: '0'
      trends: '0'
      value_type: TEXT
      description: Tabela de SFPs da Intelbras 8820i.
      tags:
      - tag: component
        value: raw
      timeout: 10s
    - uuid: 6c624b6a13344166a1bc5849af865268
      name: 'Intelbras 8820i: SNMP walk interfaces IF-MIB'
      type: SNMP_AGENT
      snmp_oid: walk[1.3.6.1.2.1.31.1.1.1.1,1.3.6.1.2.1.2.2.1.8,1.3.6.1.2.1.31.1.1.1.6,1.3.6.1.2.1.31.1.1.1.10,1.3.6.1.2.1.31.1.1.1.15]
      key: intelbras.if.walk
      delay: 5m
      timeout: 10s
      history: '0'
      trends: '0'
      value_type: TEXT
      description: Tabela IF-MIB para nomes, status, tráfego e velocidade das interfaces.
      tags:
      - tag: component
        value: raw
    discovery_rules:
    - uuid: cb337257072646779e3b0c2811af5fa4
      name: Discovery ONUs
      type: DEPENDENT
      key: intelbras.onu.discovery
      delay: '0'
      lifetime_type: DELETE_AFTER
      lifetime: 7d
      description: Descobre ONUs registradas a partir da tabela privada Intelbras.
      filter:
        evaltype: AND
        conditions:
        - macro: '{#ONU.REG}'
          value: ^1$
          operator: MATCHES_REGEX
      preprocessing:
      - type: SNMP_WALK_TO_JSON
        parameters:
        - '{#ONU.PORT}'
        - 1.3.6.1.4.1.26138.1.2.1.1.1.2
        - '0'
        - '{#ONU.ID}'
        - 1.3.6.1.4.1.26138.1.2.1.1.1.3
        - '0'
        - '{#ONU.REG}'
        - 1.3.6.1.4.1.26138.1.2.1.1.1.4
        - '0'
        - '{#ONU.ACTIVE}'
        - 1.3.6.1.4.1.26138.1.2.1.1.1.5
        - '0'
        - '{#ONU.SERIAL}'
        - 1.3.6.1.4.1.26138.1.2.1.1.1.6
        - '0'
        - '{#ONU.OMCI}'
        - 1.3.6.1.4.1.26138.1.2.1.1.1.7
        - '0'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      master_item:
        key: intelbras.onu.walk
      item_prototypes:
      - uuid: bacdf6ca616c4335b1ea62043942caaf
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: Serial'
        type: DEPENDENT
        key: intelbras.onu.serial[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.6.{#SNMPINDEX}
          - '0'
        tags:
        - tag: component
          value: onu
        - tag: pon
          value: '{#ONU.PORT}'
        - tag: onu
          value: '{#ONU.ID}'
        value_type: CHAR
      - uuid: 02b832ab38984c9abfd78d86c915baa9
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: Porta PON'
        type: DEPENDENT
        key: intelbras.onu.port[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.2.{#SNMPINDEX}
          - '0'
        tags:
        - tag: component
          value: onu
      - uuid: 7ccab5a7fb1049b5987b26eef4047e39
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: ID ONU'
        type: DEPENDENT
        key: intelbras.onu.id[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.3.{#SNMPINDEX}
          - '0'
        tags:
        - tag: component
          value: onu
      - uuid: 820d66ad8add49d2a29b40da6937d2cb
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: Registrada'
        type: DEPENDENT
        key: intelbras.onu.registered[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.4.{#SNMPINDEX}
          - '0'
        tags:
        - tag: component
          value: onu
        valuemap:
          name: Intelbras 8820i ONU registered
      - uuid: d6ff3b87c1684cfca09b7a5ad46795f3
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: Status'
        type: DEPENDENT
        key: intelbras.onu.active[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.5.{#SNMPINDEX}
          - '0'
        tags:
        - tag: component
          value: onu
        - tag: pon
          value: '{#ONU.PORT}'
        - tag: onu
          value: '{#ONU.ID}'
        valuemap:
          name: Intelbras 8820i ONU active
      - uuid: c915b14ca2fa4716a3d3a980354a4b7b
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: OMCI'
        type: DEPENDENT
        key: intelbras.onu.omci[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.7.{#SNMPINDEX}
          - '0'
        tags:
        - tag: component
          value: onu
        valuemap:
          name: Intelbras 8820i ONU OMCI
      - uuid: 9027f69f541b4277a170ceeb739bbcd0
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: RX OLT'
        type: DEPENDENT
        key: intelbras.onu.olt.rx[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.8.{#SNMPINDEX}
          - '0'
        - &id001
          type: REGEX
          parameters:
          - (-?[0-9]+(?:\.[0-9]+)?)
          - \1
          error_handler: DISCARD_VALUE
        tags:
        - tag: component
          value: optical
        - tag: pon
          value: '{#ONU.PORT}'
        - tag: onu
          value: '{#ONU.ID}'
        value_type: FLOAT
        units: dBm
      - uuid: fa24c5f29587465ab7c1795992eb84dc
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: RX ONU'
        type: DEPENDENT
        key: intelbras.onu.rx[{#SNMPINDEX}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.4.1.26138.1.2.1.1.1.9.{#SNMPINDEX}
          - '0'
        - *id001
        tags:
        - tag: component
          value: optical
        - tag: pon
          value: '{#ONU.PORT}'
        - tag: onu
          value: '{#ONU.ID}'
        value_type: FLOAT
        units: dBm
      graph_prototypes:
      - uuid: 7dc09abca243472397c39c132dd9bc81
        name: 'ONU PON {#ONU.PORT}/{#ONU.ID}: Potência óptica'
        graph_items:
        - drawtype: BOLD_LINE
          color: 199C0D
          item:
            host: Intelbras OLT 8820i by SNMP
            key: intelbras.onu.olt.rx[{#SNMPINDEX}]
        - sortorder: '1'
          drawtype: GRADIENT_LINE
          color: F63100
          item:
            host: Intelbras OLT 8820i by SNMP
            key: intelbras.onu.rx[{#SNMPINDEX}]
    - uuid: e31ac109b38c4ed4a72788f1792b3252
      name: Discovery PONs
      type: DEPENDENT
      key: intelbras.pon.discovery
      delay: '0'
      lifetime_type: DELETE_AFTER
      lifetime: 7d
      description: Descobre as portas GPON pela IF-MIB e cria contadores agregados por porta PON.
      filter:
        evaltype: AND
        conditions:
        - macro: '{#PON.NAME}'
          value: ^gpon[0-9]+$
          operator: MATCHES_REGEX
      preprocessing:
      - type: SNMP_WALK_TO_JSON
        parameters:
        - '{#PON.NAME}'
        - 1.3.6.1.2.1.31.1.1.1.1
        - '0'
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      master_item:
        key: intelbras.if.walk
      item_prototypes:
      - uuid: e5e11f5fe4b64dffb009291efa6d252a
        name: 'PON {#PON.NAME}: ONUs registradas'
        type: DEPENDENT
        key: intelbras.pon.onu.registered.count[{#PON.NAME}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - "var portName = '{#PON.NAME}';\nvar m = portName.match(/gpon(\\d+)/i);\nif (!m) {\n  throw 'Porta PON inválida: ' + portName;\n}\nvar wanted = parseInt(m[1], 10);\nvar ports = {};\nvar regs = {};\n\nvalue.split(/\\r?\\n/).forEach(function(line) {\n  var mm = line.match(/\\.?1\\.3\\.6\\.1\\.4\\.1\\.26138\\.1\\.2\\.1\\.1\\.1\\.(\\d+)\\.(\\d+)\\s*=\\s*(.*)$/);\n  if (!mm) return;\n  var col = parseInt(mm[1], 10);\n  var idx = mm[2];\n  var raw = mm[3].trim();\n  raw = raw.replace(/^[A-Za-z0-9-]+:\\s*/, '').replace(/^\"/, '').replace(/\"$/, '').trim();\n\n  if (col === 2) {\n    ports[idx] = parseInt(raw, 10);\n  } else if (col === 4) {\n    regs[idx] = parseInt(raw, 10);\n  }\n});\n\nvar total = 0;\nObject.keys(ports).forEach(function(idx) {\n  if (ports[idx] === wanted && regs[idx] === 1) {\n    total++;\n  }\n});\n\nreturn total;"
        tags:
        - tag: component
          value: onu
        - tag: component
          value: pon
        - tag: pon
          value: '{#PON.NAME}'
      - uuid: e22f844218ce4706bdde997ec9b8458a
        name: 'PON {#PON.NAME}: ONUs ativas'
        type: DEPENDENT
        key: intelbras.pon.onu.active.count[{#PON.NAME}]
        master_item:
          key: intelbras.onu.walk
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - "var portName = '{#PON.NAME}';\nvar m = portName.match(/gpon(\\d+)/i);\nif (!m) {\n  throw 'Porta PON inválida: ' + portName;\n}\nvar wanted = parseInt(m[1], 10);\nvar ports = {};\nvar regs = {};\nvar acts = {};\n\nvalue.split(/\\r?\\n/).forEach(function(line) {\n  var mm = line.match(/\\.?1\\.3\\.6\\.1\\.4\\.1\\.26138\\.1\\.2\\.1\\.1\\.1\\.(\\d+)\\.(\\d+)\\s*=\\s*(.*)$/);\n  if (!mm) return;\n  var col = parseInt(mm[1], 10);\n  var idx = mm[2];\n  var raw = mm[3].trim();\n  raw = raw.replace(/^[A-Za-z0-9-]+:\\s*/, '').replace(/^\"/, '').replace(/\"$/, '').trim();\n\n  if (col === 2) {\n    ports[idx] = parseInt(raw, 10);\n  } else if (col === 4) {\n    regs[idx] = parseInt(raw, 10);\n  } else if (col === 5) {\n    acts[idx] = parseInt(raw, 10);\n  }\n});\n\nvar total = 0;\nObject.keys(ports).forEach(function(idx) {\n  if (ports[idx] === wanted && regs[idx] === 1 && acts[idx] === 1) {\n    total++;\n  }\n});\n\nreturn total;"
        tags:
        - tag: component
          value: onu
        - tag: component
          value: pon
        - tag: pon
          value: '{#PON.NAME}'
        trigger_prototypes:
        - uuid: 47a2c02333234e78883116b101702d91
          expression: last(/Intelbras OLT 8820i by SNMP/intelbras.pon.onu.active.count[{#PON.NAME}])=0 and last(/Intelbras OLT 8820i by SNMP/intelbras.pon.onu.registered.count[{#PON.NAME}])>0
          name: 'PON {#PON.NAME}: Todas as ONUs caíram'
          event_name: 'PON {#PON.NAME}: todas as ONUs registradas estão inativas'
          opdata: 'Registradas: {ITEM.LASTVALUE2} | Ativas: {ITEM.LASTVALUE1}'
          priority: HIGH
          description: Dispara quando a porta PON ainda tem ONUs registradas, mas nenhuma ONU permanece ativa na coleta atual. Com o walk de ONUs em 3 minutos, o evento tende a abrir em cerca de 3 minutos.
          tags:
          - tag: scope
            value: availability
          - tag: component
            value: pon
      graph_prototypes:
      - uuid: 67b2222b33cf4eaf8710880481404e7d
        name: 'PON {#PON.NAME}: ONUs registradas e ativas'
        graph_items:
        - drawtype: BOLD_LINE
          color: 199C0D
          item:
            host: Intelbras OLT 8820i by SNMP
            key: intelbras.pon.onu.registered.count[{#PON.NAME}]
        - sortorder: '1'
          drawtype: GRADIENT_LINE
          color: F63100
          item:
            host: Intelbras OLT 8820i by SNMP
            key: intelbras.pon.onu.active.count[{#PON.NAME}]
    - uuid: 58263c1988da447cb5fa78bbb0c7d39b
      name: Discovery SFPs
      type: DEPENDENT
      key: intelbras.sfp.discovery
      delay: '0'
      lifetime_type: DELETE_AFTER
      lifetime: 7d
