          formulaid: L
      description: Descoberta de interfaces pela IF-MIB.
      item_prototypes:
      - uuid: 5b5126a5315545e993ee2b4a2a5a6cfd
        name: 'Interface {#IFNAME}({#IFALIAS}): Pacotes de entrada descartados'
        type: DEPENDENT
        key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
        delay: '0'
        description: 'MIB: IF-MIB

          Numero de pacotes de entrada which were chosen to be discarded

          even though no errors had been detected to prevent their being deliverable to a higher-layer protocol.

          One possible reason for discarding such a packet could be to free up buffer space.

          Discontinuities in the value of this counter can occur at re-initialization of the management system,

          and at other times as indicated by the value of ifCounterDiscontinuityTime.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}
          - '0'
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 3m
        master_item:
          key: net.if.walk
        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: d0d9298d044a45e6aeabd2a52f42dafb
        name: 'Interface {#IFNAME}({#IFALIAS}): Pacotes de entrada com erros'
        type: DEPENDENT
        key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
        delay: '0'
        description: 'MIB: IF-MIB

          For packet-oriented interfaces, the number of inbound packets that contained errors preventing them from being deliverable
          to a higher-layer protocol.  For character-oriented or fixed-length interfaces, the number of inbound transmission
          units that contained errors preventing them from being deliverable to a higher-layer protocol. Discontinuities in
          the value of this counter can occur at re-initialization of the management system, and at other times as indicated
          by the value of ifCounterDiscontinuityTime.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}
          - '0'
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 3m
        master_item:
          key: net.if.walk
        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: f412c34bb78c447996fae16d44ab9b64
        name: 'Interface {#IFNAME}({#IFALIAS}): Bits recebidos'
        type: DEPENDENT
        key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
        delay: '0'
        units: bps
        description: 'MIB: IF-MIB

          Numero total de octetos recebidos na interface, including framing characters. This object is a 64-bit version of
          ifInOctets. Discontinuities in the value of this counter can occur at re-initialization of the management system,
          and at other times as indicated by the value of ifCounterDiscontinuityTime.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}
          - '0'
        - type: CHANGE_PER_SECOND
          parameters:
          - ''
        - type: MULTIPLIER
          parameters:
          - '8'
        master_item:
          key: net.if.walk
        tags:
        - tag: componente
          value: rede
        - tag: descricao
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: d481ef0660cd49d2aa6ee59d150f4adc
        name: 'Interface {#IFNAME}({#IFALIAS}): Pacotes de saida descartados'
        type: DEPENDENT
        key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
        delay: '0'
        description: 'MIB: IF-MIB

          Numero de pacotes de saida which were chosen to be discarded

          even though no errors had been detected to prevent their being deliverable to a higher-layer protocol.

          One possible reason for discarding such a packet could be to free up buffer space.

          Discontinuities in the value of this counter can occur at re-initialization of the management system,

          and at other times as indicated by the value of ifCounterDiscontinuityTime.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}
