  - uuid: f1ca34e248fa4433b84e27d35f6e3080
    expression: (last(/0Wnet - MikroTik CCR2116-12G-4S por SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/0Wnet - MikroTik
      CCR2116-12G-4S por SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/0Wnet - MikroTik CCR2116-12G-4S por SNMP/system.hw.uptime[hrSystemUptime.0])=0
      and last(/0Wnet - MikroTik CCR2116-12G-4S por SNMP/system.net.uptime[sysUpTime.0])<10m)
    name: 'MikroTik: Host foi reiniciado'
    event_name: 'MikroTik: {HOST.NAME} foi reiniciado (tempo ativo < 10m)'
    priority: WARNING
    description: O tempo ativo e menor que 10 minutos.
    manual_close: 'YES'
    dependencies:
    - name: 'MikroTik: Sem coleta de dados SNMP'
      expression: max(/0Wnet - MikroTik CCR2116-12G-4S por SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0
    tags:
    - tag: escopo
      value: aviso
